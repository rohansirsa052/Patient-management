name: patient-management
services:
  postgres:
    image: postgres:16
    container_name: patient-service-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: patientdb

    ports:
      - "6433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: